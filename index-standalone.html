<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frozen Word Quest — Elsa's Ice Palace</title>
<link rel="stylesheet" href="shared/frozen-theme.css">
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 0 16px 40px; position: relative; z-index: 1; }

  /* Top bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; gap: 12px; flex-wrap: wrap;
  }

  /* Elsa's Castle */
  .elsa-stage {
    text-align: center; padding: 20px 16px; position: relative;
  }
  .elsa-figure {
    font-size: 120px; position: relative; display: inline-block;
    transition: all 0.4s;
    filter: drop-shadow(0 8px 20px rgba(135,206,235,0.5));
  }
  .elsa-platform {
    width: 160px; height: 12px; margin: 0 auto 8px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), rgba(255,255,255,0.8), rgba(255,255,255,0.4), transparent);
    border-radius: 50%;
  }

  /* Snowflakes around Elsa */
  .snowflake-deco {
    position: absolute; font-size: 28px; animation: floatSnow 3s ease-in-out infinite;
  }
  .snowflake-deco:nth-child(1) { top: 10px; left: 10px; animation-delay: 0s; }
  .snowflake-deco:nth-child(2) { top: 20px; right: 10px; animation-delay: 0.8s; }
  .snowflake-deco:nth-child(3) { bottom: 30px; left: 0; animation-delay: 1.6s; }
  .snowflake-deco:nth-child(4) { bottom: 20px; right: 5px; animation-delay: 2.4s; }
  @keyframes floatSnow {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    50% { transform: translateY(-12px) rotate(180deg); opacity: 1; }
  }

  /* Unit & Lesson grid */
  .unit-section { margin-top: 12px; }
  .unit-section h2 {
    font-size: 1.2rem; color: var(--deep-blue); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .unit-section h2 .unit-num {
    display: inline-flex; width: 32px; height: 32px; border-radius: 50%;
    background: var(--frost-purple); color: white; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .unit-section.locked h2 .unit-num { background: #aaa; }
  .unit-section.locked { opacity: 0.6; }

  .lesson-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .lesson-card {
    display: flex; flex-direction: column; gap: 6px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-sm);
    border: 2px solid rgba(255,255,255,0.8);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--text-dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .lesson-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .lesson-card.locked {
    opacity: 0.5; cursor: not-allowed;
    pointer-events: none;
    filter: grayscale(40%);
  }
  .lesson-card .lesson-title {
    font-weight: 700; font-size: 0.95rem;
  }
  .lesson-card .lesson-subtitle {
    font-size: 0.75rem; color: var(--text-light);
  }
  .lesson-card .stage-dots {
    display: flex; gap: 3px;
  }
  .stage-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--frost-silver);
  }
  .stage-dot.done {
    background: var(--correct-green); border-color: white;
  }
  .stage-dot.current {
    background: var(--star-yellow); border-color: white;
  }

  /* Gift Shop Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 1000;
    background: rgba(0,0,0,0.5);
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    max-width: 580px; width: 94%; max-height: 88vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    position: relative;
    border: 3px solid var(--ice-light);
  }
  .modal h3 {
    text-align: center; font-size: 1.3rem; color: var(--deep-blue); margin-bottom: 16px;
  }
  .modal .close-btn {
    position: absolute; top: 12px; right: 16px;
    font-size: 1.5rem; cursor: pointer; color: var(--text-light);
    background: none; border: none;
  }
  .shop-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .shop-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 8px; border-radius: var(--radius-sm);
    background: var(--snow-white); border: 2px solid var(--ice-light);
    cursor: pointer; transition: all 0.2s;
  }
  .shop-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .shop-item.owned { border-color: var(--correct-green); background: #E8F5E9; }
  .shop-item .item-emoji { font-size: 2rem; }
  .shop-item .item-name { font-size: 0.75rem; font-weight: 600; text-align: center; }
  .shop-item .item-cost { font-size: 0.7rem; color: var(--gold); }

  /* Equipped badge */
  .equipped-badge {
    font-size: 0.65rem; background: var(--frost-purple); color: white;
    padding: 2px 8px; border-radius: 10px;
  }

  /* Tab navigation for shop */
  .shop-tabs {
    display: flex; gap: 4px; margin-bottom: 12px; justify-content: center;
  }
  .shop-tab {
    padding: 6px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.6); border: 1px solid var(--ice-light);
    cursor: pointer; font-size: 0.85rem; font-weight: 600;
    transition: all 0.2s;
  }
  .shop-tab.active {
    background: var(--frost-purple); color: white; border-color: var(--frost-purple);
  }

  /* Sparkle animation for earning stars */
  .stars-earned {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 3rem; z-index: 2000; pointer-events: none;
    animation: starUp 1.5s ease-out forwards;
  }
  @keyframes starUp {
    0% { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%,-80%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%,-120%) scale(0.8); }
  }
</style>
</head>

<script>
// ========================================
// localStorage Manager
// ========================================

const Storage = {
  KEY: 'frozen_word_game',

  // Default state
  _default() {
    return {
      stars: 0,
      // Per-unit, per-lesson, per-stage progress
      // progress[unit][lesson] = { stage1: stars, stage2: stars, ... completed: bool }
      progress: {},
      // Inventory: array of purchased gift ids
      inventory: [],
      // Current Elsa outfit: { clothes: id|null, accessories: id|null }
      outfit: { clothes: null, accessory: null },
      // Highest unlocked unit/lesson
      unlockedUnit: 2,
      unlockedLesson: 1
    };
  },

  // Load state
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (raw) {
        const data = JSON.parse(raw);
        // Merge with defaults to handle new fields
        return { ...this._default(), ...data };
      }
    } catch (e) {}
    return this._default();
  },

  // Save state
  save(state) {
    try {
      localStorage.setItem(this.KEY, JSON.stringify(state));
    } catch (e) {}
  },

  // Add stars
  addStars(n) {
    const s = this.load();
    s.stars += n;
    this.save(s);
    return s.stars;
  },

  // Record stage completion and unlock logic
  completeStage(unit, lesson, stage, starsEarned) {
    const s = this.load();
    if (!s.progress[unit]) s.progress[unit] = {};
    if (!s.progress[unit][lesson]) s.progress[unit][lesson] = {};
    s.progress[unit][lesson][stage] = starsEarned;
    s.stars += starsEarned;

    // Check if all 5 stages completed for this lesson
    const lessonDone = ['story','listen','wordsearch','match','boss']
      .every(st => s.progress[unit]?.[lesson]?.[st] !== undefined);

    if (lessonDone) {
      s.progress[unit][lesson].completed = true;
      // Unlock next lesson or unit
      this._unlockNext(s, unit, lesson);
    }

    this.save(s);
    return s;
  },

  // Unlock next lesson
  _unlockNext(s, unit, lesson) {
    const units = Object.keys(WORD_DATA).sort((a,b)=>parseInt(a)-parseInt(b));
    const unitData = WORD_DATA[unit];
    const lessonKeys = Object.keys(unitData.lessons).sort((a,b)=>parseInt(a)-parseInt(b));
    const lessonIdx = lessonKeys.indexOf(String(lesson));

    if (lessonIdx < lessonKeys.length - 1) {
      // Unlock next lesson in same unit
      s.unlockedLesson = Math.max(s.unlockedLesson, parseInt(lessonKeys[lessonIdx + 1]));
    } else {
      // Unlock first lesson of next unit
      const unitIdx = units.indexOf(String(unit));
      if (unitIdx < units.length - 1) {
        const nextUnit = parseInt(units[unitIdx + 1]);
        if (nextUnit > s.unlockedUnit) {
          s.unlockedUnit = nextUnit;
          s.unlockedLesson = 1;
        }
      }
    }
  },

  // Buy gift item
  buyItem(itemId, category) {
    const s = this.load();
    const item = GIFT_SHOP[category].find(i => i.id === itemId);
    if (!item) return { success: false, reason: 'Item not found' };
    if (s.stars < item.cost) return { success: false, reason: 'Not enough stars' };
    if (s.inventory.includes(itemId)) return { success: false, reason: 'Already owned' };

    s.stars -= item.cost;
    s.inventory.push(itemId);
    this.save(s);
    return { success: true, stars: s.stars };
  },

  // Equip outfit
  equipOutfit(category, itemId) {
    const s = this.load();
    if (itemId && !s.inventory.includes(itemId)) return { success: false };
    if (category === 'clothes') s.outfit.clothes = itemId;
    else s.outfit.accessory = itemId;
    this.save(s);
    return { success: true };
  },

  // Get stage progress for a lesson
  getProgress(unit, lesson) {
    const s = this.load();
    return s.progress[unit]?.[lesson] || {};
  },

  // Check if a lesson is unlocked
  isUnlocked(unit, lesson) {
    const s = this.load();
    if (parseInt(unit) < s.unlockedUnit) return true;
    if (parseInt(unit) === s.unlockedUnit && parseInt(lesson) <= s.unlockedLesson) return true;
    return false;
  },

  // Get total stars
  getStars() {
    return this.load().stars;
  },

  // Get inventory
  getInventory() {
    return this.load().inventory;
  },

  // Get outfit
  getOutfit() {
    return this.load().outfit;
  }
};

</script>
<script>
// ========================================
// TTS (Text-to-Speech) Module
// ========================================

const TTS = {
  synth: window.speechSynthesis,
  speaking: false,
  _pending: null,

  // Quick reset for Chrome speech engine bug
  async _ensureReady() {
    if (!this.synth) return false;

    // Chrome bug workaround: pause+cancel+resume in sequence
    this.synth.pause();
    this.synth.cancel();
    this.synth.resume();
    this.speaking = false;

    // Minimal delay
    await new Promise(r => setTimeout(r, 50));

    // Load voices if needed (some browsers need this to work)
    let voices = this.synth.getVoices();
    if (voices.length === 0) {
      // Wait for voices to load
      await new Promise((resolve) => {
        const check = () => {
          voices = this.synth.getVoices();
          if (voices.length > 0) {
            resolve();
          } else {
            setTimeout(check, 100);
          }
        };
        this.synth.onvoiceschanged = () => resolve();
        setTimeout(() => resolve(), 800); // Failsafe
      });
    }

    return true;
  },

  async speak(text) {
    await this._ensureReady();

    return new Promise((resolve) => {
      if (!this.synth) { resolve(); return; }

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = 0.8;
      utter.pitch = 1.1;
      utter.volume = 1.0;

      let resolved = false;
      this.speaking = true;

      utter.onstart = () => {
        this.speaking = true;
      };

      utter.onend = () => {
        if (!resolved) {
          resolved = true;
          this.speaking = false;
          resolve();
        }
      };

      utter.onerror = (e) => {
        // 'canceled' errors are normal after cancel(), ignore them
        // Only treat real errors as failures
        if (e.error === 'canceled' || e.error === 'interrupted') {
          if (!resolved) {
            resolved = true;
            this.speaking = false;
            resolve();
          }
        } else {
          // Real error — wait and retry once
          if (!resolved) {
            resolved = true;
            this.speaking = false;
            resolve();
          }
        }
      };

      this.synth.speak(utter);

      // Safety timeout
      setTimeout(() => {
        if (!resolved) {
          resolved = true;
          this.speaking = false;
          resolve();
        }
      }, 15000);
    });
  },

  async speakWord(word) {
    await this._ensureReady();

    return new Promise((resolve) => {
      if (!this.synth) { resolve(); return; }

      const utter = new SpeechSynthesisUtterance(word);
      utter.lang = 'en-US';
      utter.rate = 0.7;
      utter.pitch = 1.1;
      utter.volume = 1.0;

      let resolved = false;
      this.speaking = true;

      utter.onstart = () => { this.speaking = true; };

      utter.onend = () => {
        if (!resolved) {
          resolved = true;
          this.speaking = false;
          resolve();
        }
      };

      utter.onerror = () => {
        if (!resolved) {
          resolved = true;
          this.speaking = false;
          resolve();
        }
      };

      this.synth.speak(utter);

      setTimeout(() => {
        if (!resolved) {
          resolved = true;
          this.speaking = false;
          resolve();
        }
      }, 8000);
    });
  },

  stop() {
    if (this.synth) {
      this.synth.cancel();
      this.speaking = false;
    }
  }
};

    renderUnits();
  } catch(e) {
    document.getElementById('unitGrid').innerHTML = '<div class="frost-card" style="margin:20px;padding:20px;background:#FFEBEE;border:3px solid #F44336;"><h2>❌ Error</h2><p>' + e.message + '</p></div>';
  }
}

function logout() {
  localStorage.removeItem('frozen_word_quest_login');
  window.location.href = 'login.html';
}

function updateStarDisplay() {
  const s = Storage.load();
  document.getElementById('starCount').textContent = s.stars;
  document.getElementById('shopStarCount').textContent = s.stars;
}

function renderUnits() {
  const grid = document.getElementById('unitGrid');
  grid.innerHTML = '';

  for (const [unitId, unitData] of Object.entries(WORD_DATA)) {
    const section = document.createElement('div');
    section.className = 'unit-section';
    section.innerHTML = `
      <h2>
        <span class="unit-num">❄️</span>
        ${unitData.title}
      </h2>
    `;

    const lessonGrid = document.createElement('div');
    lessonGrid.className = 'lesson-grid';

    for (const [lessonId, lessonData] of Object.entries(unitData.lessons)) {
      const isReview = lessonId === 'review';
      const hasWords = isReview || (lessonData.words && lessonData.words.length > 0);

      // Get progress
      const prog = Storage.getProgress(unitId, lessonId);
      const stages = ['story','listen','wordsearch','match','boss'];
      const completedStages = stages.filter(s => prog[s] !== undefined).length;
      const lessonCompleted = prog.completed;

      const card = document.createElement('a');
      card.className = 'lesson-card';
      if (isReview) card.style.borderColor = 'var(--frost-purple)';
      if (isReview) card.style.borderWidth = '3px';

      if (hasWords) {
        card.href = isReview
          ? `stages/1-flashcard.html?unit=${unitId}&lesson=review`
          : `stages/1-story.html?unit=${unitId}&lesson=${lessonId}`;
      }

      // Stage dots
      let dotsHtml = '';
      stages.forEach((s, i) => {
        let dotClass = '';
        if (prog[s] !== undefined) dotClass = 'done';
        else if (!lessonCompleted && i === completedStages) dotClass = 'current';
        dotsHtml += `<span class="stage-dot ${dotClass}"></span>`;
      });

      const wordCount = isReview ? '39 words (Review)' : (lessonData.words ? lessonData.words.length + ' words' : 'Coming soon');
      card.innerHTML = `
        <div class="lesson-title">${isReview ? '🔄 ' : '📖 '}${lessonData.title}</div>
        <div class="lesson-subtitle">${wordCount} · ${lessonCompleted ? '✅ Complete' : (completedStages > 0 ? completedStages + '/5 done' : '▶ Play')}</div>
        <div class="stage-dots">${dotsHtml}</div>
      `;

      lessonGrid.appendChild(card);
    }

    section.appendChild(lessonGrid);
    grid.appendChild(section);
  }
}

// ========================================
// Gift Shop
// ========================================
let currentMainTab = 'shop';
let currentShopCategory = 'food';

function openShop() {
  document.getElementById('shopModal').classList.add('show');
  document.getElementById('shopStarCount').textContent = Storage.load().stars;
  switchMainTab('shop');
}

function closeShop() {
  document.getElementById('shopModal').classList.remove('show');
  updateStarDisplay();
  renderUnits();
  updateElsaAppearance();
}

// Main tab switch: Shop / Inventory / Dress Up
function switchMainTab(tab) {
  currentMainTab = tab;
  // Highlight tab
  document.querySelectorAll('#mainTabs .shop-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.maintab === tab);
  });
  // Show/hide sections
  document.getElementById('subTabs').style.display = tab === 'shop' ? 'flex' : 'none';
  document.getElementById('shopGrid').style.display = tab === 'shop' ? 'grid' : 'none';
  document.getElementById('inventoryGrid').style.display = tab === 'inventory' ? 'grid' : 'none';
  document.getElementById('dressupArea').style.display = tab === 'dressup' ? 'block' : 'none';

  if (tab === 'shop') renderShop();
  if (tab === 'inventory') renderInventory();
  if (tab === 'dressup') renderDressUp();
}

// Shop sub-tabs
function switchShopTab(cat) {
  currentShopCategory = cat;
  document.querySelectorAll('#subTabs .shop-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.shoptab === cat);
  });
  renderShop();
}

// Render shop (buy items)
function renderShop() {
  const grid = document.getElementById('shopGrid');
  const s = Storage.load();
  const items = GIFT_SHOP[currentShopCategory];

  grid.innerHTML = items.map(item => {
    const owned = s.inventory.includes(item.id);
    const canBuy = !owned && s.stars >= item.cost;

    return `
      <div class="shop-item ${owned ? 'owned' : ''}" onclick="${owned ? '' : `buyItem('${item.id}', '${currentShopCategory}')`}">
        <span class="item-emoji">${item.emoji}</span>
        <span class="item-name">${item.name}</span>
        ${owned ? '<span class="equipped-badge" style="background:#4CAF50;">Owned</span>' :
          `<span class="item-cost">⭐ ${item.cost}</span>`}
      </div>
    `;
  }).join('');
}

function buyItem(itemId, category) {
  const result = Storage.buyItem(itemId, category);
  if (result.success) {
    const item = GIFT_SHOP[category].find(i => i.id === itemId);
    showStarsEarned(-1 * item.cost);
    updateStarDisplay();
    renderShop();
  } else {
    alert(result.reason === 'Not enough stars' ? 'Not enough stars! ⭐ Complete more stages to earn stars.' : result.reason);
  }
}

// Render inventory (my items)
function renderInventory() {
  const grid = document.getElementById('inventoryGrid');
  const s = Storage.load();
  let allOwned = [];

  for (const [cat, items] of Object.entries(GIFT_SHOP)) {
    items.forEach(item => {
      if (s.inventory.includes(item.id)) {
        allOwned.push({ ...item, category: cat });
      }
    });
  }

  if (allOwned.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-light);grid-column:1/-1;padding:20px;">No items yet. Earn stars and buy gifts!</p>';
    return;
  }

  grid.innerHTML = allOwned.map(item => {
    const equipped = (item.category === 'clothes' && s.outfit.clothes === item.id) ||
                    (item.category === 'accessories' && s.outfit.accessory === item.id);
    return `
      <div class="shop-item owned">
        <span class="item-emoji">${item.emoji}</span>
        <span class="item-name">${item.name}</span>
        ${equipped ? '<span class="equipped-badge">Wearing</span>' :
          `<span class="equipped-badge" style="background:#4CAF50;">Owned</span>`}
      </div>
    `;
  }).join('');
}

// Render dress-up area
function renderDressUp() {
  const s = Storage.load();
  const grid = document.getElementById('dressupItems');

  // Update Elsa's look
  updateDressUpElsa();

  // Show owned clothes + accessories
  let dressItems = [];
  for (const cat of ['clothes', 'accessories']) {
    GIFT_SHOP[cat].forEach(item => {
      if (s.inventory.includes(item.id)) {
        dressItems.push({ ...item, category: cat });
      }
    });
  }

  if (dressItems.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-light);grid-column:1/-1;padding:20px;">Buy some clothes first! Go to 🛍️ Shop.</p>';
    return;
  }

  grid.innerHTML = dressItems.map(item => {
    const equipped = (item.category === 'clothes' && s.outfit.clothes === item.id) ||
                    (item.category === 'accessories' && s.outfit.accessory === item.id);
    return `
      <div class="shop-item ${equipped ? 'owned' : ''}"
           style="${equipped ? 'border-color:var(--frost-purple);border-width:3px;' : ''}"
           onclick="equipOnElsa('${item.id}', '${item.category}')">
        <span class="item-emoji">${item.emoji}</span>
        <span class="item-name">${item.name}</span>
        ${equipped ? '<span class="equipped-badge">Wearing</span>' : '<span style="font-size:0.65rem;color:var(--frost-purple);">Tap to wear</span>'}
      </div>
    `;
  }).join('');
}

function equipOnElsa(itemId, category) {
  const s = Storage.load();
  // If already equipped, unequip it
  if ((category === 'clothes' && s.outfit.clothes === itemId) ||
      (category === 'accessories' && s.outfit.accessory === itemId)) {
    Storage.equipOutfit(category, null);
  } else {
    Storage.equipOutfit(category, itemId);
  }
  renderDressUp();
  updateElsaAppearance();
  updateDressUpElsa();
}

function updateDressUpElsa() {
  const s = Storage.load();
  const accLayer = document.getElementById('elsaAccLayer');
  const clothLayer = document.getElementById('elsaClothesLayer');

  if (s.outfit.accessory) {
    const acc = GIFT_SHOP.accessories.find(i => i.id === s.outfit.accessory);
    accLayer.textContent = acc ? acc.emoji : '';
  } else {
    accLayer.textContent = '';
  }

  if (s.outfit.clothes) {
    const cloth = GIFT_SHOP.clothes.find(i => i.id === s.outfit.clothes);
    clothLayer.textContent = cloth ? cloth.emoji : '';
  } else {
    clothLayer.textContent = '';
  }
}

// Update main page Elsa — always show just the basic Elsa
function updateElsaAppearance() {
  document.getElementById('elsaFigure').textContent = '👸';
}

// Allow equipping null (unequip) in storage
// (storage.js already handles this — equipOutfit with null works)

function showStarsEarned(amount) {
  const el = document.createElement('div');
  el.className = 'stars-earned';
  el.textContent = amount > 0 ? `+${amount} ⭐` : `${amount} ⭐`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// Init on load
init();
updateElsaAppearance();
</script>
