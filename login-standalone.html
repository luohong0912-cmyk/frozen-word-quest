<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frozen Word Quest — Login</title>
<style>/* ========================================
   Frozen (冰雪奇缘) Theme — Word Game
   ======================================== */

:root {
  --ice-blue: #87CEEB;
  --ice-light: #B0E0E6;
  --ice-pale: #E0F4FF;
  --snow-white: #F5F9FC;
  --frost-purple: #9370DB;
  --frost-purple-light: #B39DDB;
  --frost-silver: #C0C0C0;
  --deep-blue: #1a3a5c;
  --gold: #FFD700;
  --gold-light: #FFED4A;
  --star-yellow: #FFC107;
  --correct-green: #4CAF50;
  --wrong-red: #F44336;
  --text-dark: #2c3e50;
  --text-light: #5a6c7d;
  --shadow: 0 4px 15px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #E0F4FF 0%, #B0E0E6 30%, #87CEEB 60%, #5B9BD5 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text-dark);
  overflow-x: hidden;
  position: relative;
}

/* Snowflake background animation */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 25% 45%, rgba(255,255,255,0.6), transparent),
    radial-gradient(3px 3px at 40% 15%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 55% 35%, rgba(255,255,255,0.5), transparent),
    radial-gradient(3px 3px at 70% 25%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 85% 50%, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 15% 70%, rgba(255,255,255,0.5), transparent),
    radial-gradient(3px 3px at 60% 65%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 90% 80%, rgba(255,255,255,0.6), transparent),
    radial-gradient(3px 3px at 35% 85%, rgba(255,255,255,0.5), transparent);
  animation: snowDrift 20s linear infinite;
}

@keyframes snowDrift {
  0% { transform: translateY(0); }
  100% { transform: translateY(-30px); }
}

/* Frosted glass card */
.frost-card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  border: 2px solid rgba(255,255,255,0.8);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
  padding: 24px;
}

/* Ice button */
.ice-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--ice-blue), var(--ice-light));
  border: 2px solid rgba(255,255,255,0.8);
  border-radius: 32px;
  color: var(--deep-blue);
  font-size: 1.1rem; font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow), inset 0 2px 0 rgba(255,255,255,0.8);
  transition: all 0.2s;
  position: relative; z-index: 1;
  user-select: none;
  text-decoration: none;
}
.ice-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg), inset 0 2px 0 rgba(255,255,255,0.8);
}
.ice-btn:active {
  transform: translateY(0);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.ice-btn.purple {
  background: linear-gradient(135deg, var(--frost-purple), var(--frost-purple-light));
  color: white;
}
.ice-btn.gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep-blue);
}
.ice-btn:disabled {
  opacity: 0.5; cursor: not-allowed; pointer-events: none;
}

/* Snowflake decoration */
.snowflake-icon {
  font-size: 1.4em;
  animation: spin 8s linear infinite;
  display: inline-block;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Star display */
.star-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.6);
  border-radius: 24px;
  font-weight: 700; font-size: 1rem;
  color: var(--deep-blue);
  border: 1px solid rgba(255,255,255,0.8);
}
.star-bar .star-icon { font-size: 1.3em; }

/* Page header */
.page-header {
  text-align: center; padding: 20px 16px 8px;
  position: relative; z-index: 1;
}
.page-header h1 {
  font-size: 1.8rem;
  color: var(--deep-blue);
  text-shadow: 0 2px 4px rgba(255,255,255,0.6);
}
.page-header .subtitle {
  color: var(--text-light); font-size: 0.95rem; margin-top: 4px;
}

/* Stage indicator pills */
.stage-pills {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 16px; position: relative; z-index: 1;
}
.stage-pill {
  padding: 6px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.5);
  font-size: 0.8rem; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.6);
  color: var(--text-light);
}
.stage-pill.active {
  background: linear-gradient(135deg, var(--ice-blue), var(--ice-light));
  color: var(--deep-blue);
  border-color: white;
  box-shadow: 0 2px 8px rgba(135,206,235,0.4);
}
.stage-pill.done {
  background: var(--correct-green);
  color: white; border-color: white;
}

/* Word card */
.word-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 16px 20px;
  background: white;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  border: 2px solid var(--ice-light);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  min-width: 80px;
}
.word-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--ice-blue);
}
.word-card .word-emoji { font-size: 2.4rem; }

/* Custom SVG emoji */
.custom-emoji-svg {
  display: inline-block; vertical-align: middle;
}
/* Scene emoji (big) */
.scene-emoji .custom-emoji-svg { width: 72px; height: auto; }
/* Word choice emoji */
.choice-emoji .custom-emoji-svg,
.match-emoji .custom-emoji-svg { width: 48px; height: auto; }
/* Boss choice */
.boss-choice .custom-emoji-svg { width: 48px; height: auto; }
/* Review card */
.rev-emoji .custom-emoji-svg { width: 36px; height: auto; }
.word-card .word-en { font-size: 1.1rem; font-weight: 700; color: var(--deep-blue); }

/* Animation: pop-in */
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
.pop-in { animation: popIn 0.4s ease-out forwards; }

/* Animation: sparkle */
@keyframes sparkle {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.sparkle { animation: sparkle 0.6s ease-in-out; }

/* Animation: shake */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-6px); }
  40%,80% { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease; }

/* Snow overlay */
.snow-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9999;
}

/* Progress bar */
.progress-bar {
  width: 100%; height: 8px;
  background: rgba(255,255,255,0.5);
  border-radius: 4px; overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ice-blue), var(--frost-purple));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* Responsive — phones */
@media (max-width: 600px) {
  .page-header h1 { font-size: 1.4rem; }
  .ice-btn { padding: 10px 20px; font-size: 0.95rem; }
  .frost-card { padding: 16px; }
}

/* iPad / Tablet */
@media (min-width: 601px) and (max-width: 1024px) {
  .container { max-width: 90vw; }
  .page-header h1 { font-size: 1.6rem; }
  .ice-btn { padding: 14px 30px; font-size: 1.1rem; min-height: 48px; }
  .word-btn { padding: 14px 26px; font-size: 1.15rem; min-height: 48px; }
  .word-choice { padding: 16px 18px; font-size: 1.15rem; min-height: 48px; }
  .speaker-btn { width: 80px; height: 80px; font-size: 2.5rem; }
  .letter-cell { width: 44px; height: 44px; font-size: 1.2rem; }
  .choice-card { padding: 22px 18px; }
  .boss-choice { padding: 18px 14px; font-size: 1.1rem; min-height: 52px; }
}

/* iPad touch optimization */
@media (hover: none) and (pointer: coarse) {
  .word-btn, .word-choice, .choice-card, .boss-choice, .match-card, .letter-cell {
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }
  .word-btn:active, .word-choice:active, .choice-card:active, .boss-choice:active {
    transform: scale(0.95);
  }
}
</style>
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
  }
  .login-card {
    text-align: center; padding: 40px 28px; max-width: 400px; width: 90%;
  }
  .login-elsa { font-size: 5rem; margin-bottom: 8px; }
  .login-title {
    font-size: 1.5rem; font-weight: 800; color: var(--deep-blue); margin-bottom: 4px;
  }
  .login-sub {
    font-size: 0.9rem; color: var(--text-light); margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 16px; text-align: left;
  }
  .input-group label {
    display: block; font-size: 0.85rem; font-weight: 600;
    color: var(--text-dark); margin-bottom: 6px;
  }
  .phone-input {
    width: 100%; padding: 14px 16px; font-size: 1.2rem;
    border: 2px solid var(--ice-light); border-radius: var(--radius);
    background: white; color: var(--deep-blue); outline: none;
    box-sizing: border-box; letter-spacing: 2px;
    transition: border-color 0.2s;
  }
  .phone-input:focus { border-color: var(--ice-blue); }
  .phone-input::placeholder { color: var(--frost-silver); letter-spacing: 1px; }
  .error-msg {
    color: var(--wrong-red); font-size: 0.85rem; font-weight: 600;
    min-height: 20px; margin-top: 4px;
  }
  .login-btn {
    width: 100%; padding: 14px; font-size: 1.15rem; margin-top: 8px;
  }
  .snowflake-bg {
    position: absolute; font-size: 2rem; opacity: 0.3; pointer-events: none;
  }
</style>
</head>
<body>

<div class="frost-card login-card">
  <div class="login-elsa">👸</div>
  <div class="login-title">Frozen Word Quest</div>
  <div class="login-sub">Enter your phone number to start</div>

  <div class="input-group">
    <label>📱 Phone Number</label>
    <input type="tel" class="phone-input" id="phoneInput"
           placeholder="Enter phone number"
           maxlength="11" inputmode="numeric" pattern="[0-9]*"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <button class="ice-btn gold login-btn" onclick="doLogin()">❄️ Enter the Ice Palace</button>
</div>

<!-- ============================================
     WHITELIST — edit phone numbers below
     Add/remove numbers as needed
     ============================================ -->
<script>
const PHONE_WHITELIST = [
  "15018406631",
  "13544353934"
  // Add more numbers above this line
];
</script>

<script>
// ========================================
// Check if already logged in
// ========================================
(function() {
  const token = localStorage.getItem('frozen_word_quest_login');
  if (token) {
    try {
      const data = JSON.parse(atob(token));
      // Check if login is still valid (24 hours)
      if (data.phone && data.expires > Date.now()) {
        window.location.href = 'index.html';
      }
    } catch(e) {}
  }
})();

function doLogin() {
  const phone = document.getElementById('phoneInput').value.trim();
  const errorEl = document.getElementById('errorMsg');

  // Validate
  if (!phone) {
    errorEl.textContent = 'Please enter your phone number';
    return;
  }
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    errorEl.textContent = 'Please enter a valid 11-digit phone number';
    return;
  }

  // Check whitelist
  if (!PHONE_WHITELIST.includes(phone)) {
    errorEl.textContent = 'This number is not registered. Please contact your teacher.';
    return;
  }

  // Success! Save login token (valid 24 hours)
  const token = btoa(JSON.stringify({
    phone: phone,
    expires: Date.now() + 24 * 60 * 60 * 1000
  }));
  localStorage.setItem('frozen_word_quest_login', token);

  // Redirect to main game
  window.location.href = 'index.html';
}

// Allow Enter key to submit
document.getElementById('phoneInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
